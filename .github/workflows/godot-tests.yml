name: Godot tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            archive_name: Godot_v4.7-stable_win64.exe.zip
            archive_url: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_win64.exe.zip
            archive_sha256: 02a5312236f4e0209c78bcb2f52135b1963e6b8888c873c9cee81459e60bcd71
            executable: Godot_v4.7-stable_win64.exe
          - name: macOS
            os: macos-latest
            archive_name: Godot_v4.7-stable_macos.universal.zip
            archive_url: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_macos.universal.zip
            archive_sha256: a6708c336f690e0dd8abd3d587d661707f4f33ed436946a3ec000d2fb497fd6c
            executable: Godot.app/Contents/MacOS/Godot
          - name: Linux
            os: ubuntu-latest
            archive_name: Godot_v4.7-stable_linux.x86_64.zip
            archive_url: https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
            archive_sha256: 0b1a6c54c2c619c12e169fe9241edda4b81080b519451cec2984bf0d2c6cb73c
            executable: Godot_v4.7-stable_linux.x86_64
    steps:
      - uses: actions/checkout@v5
      - name: Download verified Godot
        shell: pwsh
        env:
          ARCHIVE_NAME: ${{ matrix.archive_name }}
          ARCHIVE_URL: ${{ matrix.archive_url }}
          ARCHIVE_SHA256: ${{ matrix.archive_sha256 }}
          EXECUTABLE: ${{ matrix.executable }}
        run: |
          $archive = Join-Path $env:RUNNER_TEMP $env:ARCHIVE_NAME
          Invoke-WebRequest -Uri $env:ARCHIVE_URL -OutFile $archive
          $actualHash = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualHash -ne $env:ARCHIVE_SHA256) {
            throw "Godot archive checksum mismatch. Expected $env:ARCHIVE_SHA256, got $actualHash."
          }
          Expand-Archive -LiteralPath $archive -DestinationPath $env:RUNNER_TEMP -Force
          $godotBinary = Join-Path $env:RUNNER_TEMP $env:EXECUTABLE
          if (-not (Test-Path -LiteralPath $godotBinary -PathType Leaf)) {
            throw "Godot executable was not found at $godotBinary."
          }
          if ($env:RUNNER_OS -ne "Windows") {
            & chmod +x $godotBinary
          }
          "GODOT_BIN=$godotBinary" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Validate and test
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq "Windows") {
            & "$env:GITHUB_WORKSPACE\tools\godot.ps1" all
          }
          else {
            bash "$env:GITHUB_WORKSPACE/tools/godot.sh" all
          }
  required:
    name: Godot tests
    if: ${{ always() }}
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Require every platform to pass
        run: test "${{ needs.test.result }}" = success
