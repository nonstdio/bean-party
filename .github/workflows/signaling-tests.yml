name: Signaling service tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Node signaling tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/signaling
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/signaling/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run service tests
        run: npm test
      - name: Build container image
        run: docker build -t bean-party-signaling:test .
      - name: Container health check
        run: |
          set -euo pipefail
          cid=$(docker run -d -e PORT=8080 -p 8080:8080 bean-party-signaling:test)
          trap 'docker rm -f "$cid"' EXIT
          for attempt in $(seq 1 20); do
            if curl -fsS "http://127.0.0.1:8080/healthz" >/dev/null; then
              curl -fsS "http://127.0.0.1:8080/readyz" | grep -q '"status":"ready"'
              exit 0
            fi
            sleep 1
          done
          echo "Container health check failed"
          docker logs "$cid"
          exit 1
